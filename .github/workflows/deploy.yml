name: "Roster CI/CD Pipeline"

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
concurrency:
  group: terraform-apply
  cancel-in-progress: true

jobs:

  # ── Job 1: Snyk SAST — source code scan ──────────────────────────────────
  snyk-sast:
    name: "Snyk Code (SAST)"
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Snyk CLI
        run: |
          curl -sL https://static.snyk.io/cli/latest/snyk-linux -o snyk
          chmod +x snyk
          ./snyk --version

      - name: Snyk Code scan
        run: ./snyk code test --severity-threshold=high app/
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

  # ── Job 2: Build, Snyk container scan, push, deploy ──────────────────────
  build-and-deploy:
    name: "Build, Scan, Push, Deploy"
    runs-on: ubuntu-latest
    needs: snyk-sast
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP via OIDC
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.SA_EMAIL }}
          token_format: access_token

      - name: Set up Docker
        uses: docker/setup-buildx-action@v3

      - name: Login to Artifact Registry
        uses: docker/login-action@v3
        with:
          registry: us-central1-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Build Docker image
        run: |
          docker build \
            -t us-central1-docker.pkg.dev/${{ vars.TF_VAR_PROJECT_ID }}/roster-app/roster:${{ github.sha }} \
            -t us-central1-docker.pkg.dev/${{ vars.TF_VAR_PROJECT_ID }}/roster-app/roster:latest \
            .

      - name: Download Snyk CLI
        run: |
          curl -sL https://static.snyk.io/cli/latest/snyk-linux -o snyk
          chmod +x snyk

      - name: Snyk container scan
        run: |
          ./snyk container test \
            us-central1-docker.pkg.dev/${{ vars.TF_VAR_PROJECT_ID }}/roster-app/roster:${{ github.sha }} \
            --file=Dockerfile \
            --severity-threshold=high
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Push image to Artifact Registry
        run: |
          docker push us-central1-docker.pkg.dev/${{ vars.TF_VAR_PROJECT_ID }}/roster-app/roster:${{ github.sha }}
          docker push us-central1-docker.pkg.dev/${{ vars.TF_VAR_PROJECT_ID }}/roster-app/roster:latest

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6

      - name: Terraform Init (app)
        run: terraform init
        working-directory: terraform/app
        env:
          TF_VAR_project_id: ${{ vars.TF_VAR_PROJECT_ID }}

      - name: Terraform Apply (app)
        run: terraform apply -auto-approve
        working-directory: terraform/app
        env:
          TF_VAR_project_id: ${{ vars.TF_VAR_PROJECT_ID }}
          TF_VAR_image_tag: ${{ github.sha }}

      - name: Update Cloud Run secrets
        run: |
          gcloud run services update roster-app \
            --region us-central1 \
            --update-secrets="DB_PASSWORD=roster-db-password:latest"
