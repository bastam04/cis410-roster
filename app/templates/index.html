{% for shift in shifts %}
<div class="shift-card">
    <h3>{{ shift.title }}</h3>
    <p>Date: {{ shift.date }} | Time: {{ shift.start }} - {{ shift.end }}</p>

    {% if not shift.claimed_by %}
    <form action="/shifts/{{ shift.id }}/claim" method="POST">
        <input type="text" name="employee" placeholder="Your Name" required>
        <button type="submit">Claim Shift</button>
    </form>
    {% else %}
    <p><strong>Claimed by:</strong> {{ shift.claimed_by }}</p>
    {% endif %}
</div>
{% endfor %}
<hr>
<h2>Manager: Post a New Shift</h2>
<form action="/shifts" method="POST">
    <label>Shift Title:</label><br>
    <input type="text" name="title" placeholder="e.g. Morning Cashier" required><br>

    <label>Date:</label><br>
    <input type="date" name="date" required><br>

    <label>Start Time:</label><br>
    <input type="time" name="start" required><br>

    <label>End Time:</label><br>
    <input type="time" name="end" required><br>

    <button type="submit" style="background-color: #28a745; color: white;">Create Shift</button>
</form>
